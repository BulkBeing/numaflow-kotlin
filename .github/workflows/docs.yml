name: Publish Documentation

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build docs for (e.g. 0.1.0-rc.1)'
        required: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Checkout gh-pages for previous versions
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare previous doc versions
        run: |
          mkdir -p previousDocVersions
          if [ -d "gh-pages" ]; then
            # Copy each version directory as a previous version
            for dir in gh-pages/*/; do
              version_name=$(basename "$dir")
              # Skip special directories
              if [ "$version_name" != "older" ] && [ "$version_name" != "assets" ]; then
                cp -r "$dir" "previousDocVersions/$version_name"
              fi
            done
          fi

      - name: Generate Dokka HTML
        run: ./gradlew dokkaGeneratePublicationHtml
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

      - name: Assemble site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p site

          # Copy previous version directories to site
          if [ -d "gh-pages" ]; then
            for dir in gh-pages/*/; do
              version_name=$(basename "$dir")
              if [ "$version_name" != "older" ] && [ "$version_name" != "assets" ]; then
                cp -r "$dir" "site/$version_name"
              fi
            done
          fi

          # Copy current version docs to its own directory
          cp -r build/dokka/html "site/$VERSION"

          # Root serves the latest version
          cp -r build/dokka/html/* site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
